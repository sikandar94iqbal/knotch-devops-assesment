apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "api-service.fullname" . }}-gcp
  labels:
    {{- include "api-service.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcpProjectId | quote }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.gcpRegion | quote }}
          clusterName: {{ .Values.externalSecrets.clusterName | quote }}
          clusterProjectID: {{ .Values.externalSecrets.gcpProjectId | quote }}
          # Scoped to this namespace: ESO mints a token for this chart's own
          # ServiceAccount (already Workload-Identity-bound to the app's GSA,
          # which holds secretAccessor on exactly the two secrets below) -
          # one tenant's SecretStore can never read another tenant's
          # secrets, even though ESO itself is a shared, cluster-wide
          # controller.
          serviceAccountRef:
            name: {{ include "api-service.serviceAccountName" . }}
