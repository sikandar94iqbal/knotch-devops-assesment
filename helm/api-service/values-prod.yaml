# Overrides layered on top of values.yaml for the prod environment.
# Non-placeholder values below (project ID, cluster name, DB host, SA
# email) are filled in from `terraform output` after `terraform apply` in
# terraform/environments/prod - see the README bootstrap section.

replicaCount: 3

autoscaling:
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

pdb:
  minAvailable: 2

gateway:
  hostname: "api-prod.tenant.internal"
  certificateMapName: "tenant-prod-certmap"

cloudArmor:
  securityPolicyName: "tenant-prod-armor-policy"

serviceAccount:
  gcpServiceAccountEmail: "tenant-prod-app-sa@knotch-prod.iam.gserviceaccount.com"

database:
  host: "10.162.0.2"
  name: appdb
  user: appuser

externalSecrets:
  gcpProjectId: "knotch-prod"
  gcpRegion: us-central1
  clusterName: "tenant-prod-gke"
  dbPasswordSecretId: "tenant-prod-db-password"
  thirdPartyApiKeySecretId: "tenant-prod-third-party-api-key"
  refreshInterval: 1m
